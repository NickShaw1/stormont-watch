name: Daily sync

on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:

concurrency:
  group: sync
  cancel-in-progress: false

jobs:
  sync:
    name: Sync Assembly data
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      actions: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run sync
        run: npm run sync
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Trigger deploy
        if: success()
        run: |
          curl -X POST \
            -H "Authorization: token ${{ secrets.WORKFLOW_PAT }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/NickShaw1/stormont-watch/actions/workflows/deploy.yml/dispatches \
            -d '{"ref":"main"}'
