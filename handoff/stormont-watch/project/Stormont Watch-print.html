<!doctype html>
<html lang="en-GB">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Stormont Watch — Print</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@400;500&display=swap">
<link rel="stylesheet" href="styles/tokens.css">
<link rel="stylesheet" href="styles/base.css">
<link rel="stylesheet" href="styles/app.css">
<style>
  /* ── Print shell overrides ── */
  html, body { background: var(--paper); }
  body { margin: 0; }

  .print-doc {
    background: var(--paper);
  }
  .print-page {
    width: 100%;
    max-width: 1440px;
    margin: 0 auto;
    background: var(--paper);
    border-bottom: 1px solid var(--rule);
    break-after: page;
    page-break-after: always;
  }
  .print-page:last-child {
    break-after: auto;
    page-break-after: auto;
    border-bottom: none;
  }
  .print-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--ink-3);
    padding: 10px 32px;
    border-bottom: 1px solid var(--rule);
    background: var(--paper-2);
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .print-label .url { color: var(--ink-2); }

  /* Kill anything interactive/hoverable */
  .print-page a { color: inherit; text-decoration: none; }
  .print-page button { cursor: default; }

  /* Screen preview */
  @media screen {
    body { padding: 20px; background: oklch(95% 0.005 95); }
    .print-page { box-shadow: 0 8px 32px -12px oklch(40% 0.01 250 / 0.2); margin-bottom: 24px; border-radius: 6px; overflow: hidden; }
  }

  /* Print rules */
  @media print {
    @page {
      size: A4 portrait;
      margin: 10mm;
    }
    html, body { background: white; }
    body { padding: 0; }
    .print-page {
      box-shadow: none !important;
      border: none;
      margin: 0;
      border-radius: 0;
    }
    .print-label { background: white; border-bottom: 1px solid #ccc; }
    * {
      -webkit-print-color-adjust: exact !important;
      print-color-adjust: exact !important;
    }
    /* Don't let tall pages clip */
    .site-content, .page, section { break-inside: auto; }
    /* Avoid awkward breaks inside cards */
    .card, .stat-card, .bill-card, .mla-card, .vote-card, .block { break-inside: avoid; page-break-inside: avoid; }
  }

  /* Hide the toolbar/tweaks that normally wrap the site */
  .app-toolbar, .viewport-stage, .tweaks-panel { display: none !important; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel" src="src/data.jsx"></script>
<script type="text/babel" src="src/shell.jsx"></script>
<script type="text/babel" src="src/home.jsx"></script>
<script type="text/babel" src="src/mlas.jsx"></script>
<script type="text/babel" src="src/mla.jsx"></script>
<script type="text/babel" src="src/bills.jsx"></script>
<script type="text/babel" src="src/bill.jsx"></script>
<script type="text/babel" src="src/votes.jsx"></script>
<script type="text/babel" src="src/vote.jsx"></script>
<script type="text/babel" src="src/structure.jsx"></script>
<script type="text/babel" src="src/stats.jsx"></script>
<script type="text/babel" src="src/expenses.jsx"></script>
<script type="text/babel" src="src/legal.jsx"></script>

<script type="text/babel">
const { SiteNav, SiteFooter } = window.SW_UI;

const PAGES = [
  ['home',      'Home',              '/',                          (g) => <window.Home goto={g}/>],
  ['structure', 'Assembly structure','/assembly',                  (g) => <window.StructurePage goto={g}/>],
  ['mlas',      'MLAs',              '/mlas',                      (g) => <window.MlasPage goto={g}/>],
  ['mla',       'MLA profile',       '/mlas/michelle-oneill',      (g) => <window.MlaProfile goto={g}/>],
  ['bills',     'Legislation',       '/legislation',               (g) => <window.BillsPage goto={g}/>],
  ['bill',      'Bill detail',       '/legislation/nia-14-22-27',  (g) => <window.BillDetail goto={g}/>],
  ['votes',     'Votes',             '/votes',                     (g) => <window.VotesPage goto={g}/>],
  ['vote',      'Division detail',   '/votes/d-3421',              (g) => <window.VoteDetail goto={g}/>],
  ['stats',     'Statistics',        '/stats',                     () => <window.StatsPage/>],
  ['expenses',  'Expenses',          '/expenses',                  (g) => <window.ExpensesPage goto={g}/>],
  ['about',     'About',             '/about',                     () => <window.LegalPage which="about"/>],
  ['privacy',   'Privacy',           '/privacy',                   () => <window.LegalPage which="privacy"/>],
  ['terms',     'Terms',             '/terms',                     () => <window.LegalPage which="terms"/>],
];

function nop() {}

function PrintDoc() {
  return (
    <div className="app print-doc" data-accent="" data-density="">
      {PAGES.map(([key, label, url, render]) => {
        const navKey = key === 'mla' ? 'mlas' : key === 'bill' ? 'bills' : key === 'vote' ? 'votes' : key;
        return (
          <section key={key} className="print-page">
            <div className="print-label">
              <span>{label}</span>
              <span className="url">stormontwatch.org{url}</span>
            </div>
            <div className="site-content" data-vp="desktop">
              <SiteNav currentPage={navKey} goto={nop} vp="desktop"/>
              {render(nop)}
              <SiteFooter/>
            </div>
          </section>
        );
      })}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<PrintDoc/>);

// Auto-print after fonts + layout settle
(async () => {
  try {
    if (document.fonts && document.fonts.ready) { await document.fonts.ready; }
  } catch(e) {}
  // Wait a beat for React + images + any async layout
  await new Promise(r => setTimeout(r, 1200));
  window.print();
})();
</script>
</body>
</html>
